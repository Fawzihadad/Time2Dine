{% extends "base.html" %}

{% block title %}Account Activated{% endblock %}

{% block content %}

<div class="container py-5 text-center" style="max-width:600px;">

    <div class="card shadow-lg border-0 rounded-4 p-5">

        <h2 class="fw-bold text-success mb-3">
            ✅ Account Activated!
        </h2>

        <p class="text-muted mb-4">
            Your Time2Dine account has been successfully verified.
            You will be redirected to the homepage shortly.
        </p>

        <a href="{% url 'home' %}" class="btn btn-primary btn-lg rounded-pill">
            Go to Homepage
        </a>

        <p class="text-muted mt-4">
            Redirecting in <span id="timer">5</span> seconds...
        </p>

    </div>

</div>

<script>
let seconds = 5;

const timer = document.getElementById("timer");

const countdown = setInterval(function() {
    seconds--;
    timer.textContent = seconds;

    if (seconds <= 0) {
        clearInterval(countdown);
        window.location.href = "{% url 'home' %}";
    }

}, 1000);
</script>

{% endblock %}
