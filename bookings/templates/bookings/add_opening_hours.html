{% extends "base.html" %}

{% block title %}Add Opening Hours{% endblock %}

{% block content %}

<div class="container py-5">

<h2 class="mb-4">Add Opening Hours</h2>

<form method="post">
{% csrf_token %}

<div class="mb-3">
<label class="form-label">Day</label>
{{ form.day_of_week }}
</div>

<div class="mb-3">
<label class="form-label">Open Time</label>
{{ form.open_time }}
</div>

<div class="mb-3">
<label class="form-label">Close Time</label>
{{ form.close_time }}
</div>

<button type="submit" class="btn btn-primary">
Save Opening Hours
</button>

</form>

</div>

{% endblock %}
