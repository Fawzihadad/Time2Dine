{% extends "base.html" %}

{% block title %}Manage Tables{% endblock %}

{% block content %}

<div class="container py-5">

<h2 class="mb-4">Manage Tables</h2>

<a href="{% url 'add_table' %}" class="btn btn-primary mb-3">
Add Table
</a>

<table class="table table-striped">

<thead>
<tr>
<th>Table</th>
<th>Capacity</th>
<th>Action</th>
</tr>
</thead>

<tbody>

{% for table in tables %}

<tr>
<td>{{ table.identifier }}</td>
<td>{{ table.capacity }}</td>

<td>
<a href="{% url 'edit_table' table.id %}" class="btn btn-sm btn-warning">
Edit
</a>
</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
