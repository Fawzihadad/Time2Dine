{% extends "base.html" %}

{% block title %}Add Table{% endblock %}

{% block content %}

<div class="container py-5">

<h2 class="mb-4">Add Table</h2>

<form method="post">
{% csrf_token %}

<div class="mb-3">
<label class="form-label">Table Identifier</label>
{{ form.identifier }}
</div>

<div class="mb-3">
<label class="form-label">Capacity</label>
{{ form.capacity }}
</div>

<button type="submit" class="btn btn-primary">
Add Table
</button>

</form>

</div>

{% endblock %}
